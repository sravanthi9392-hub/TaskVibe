{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card premium-card p-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
                        <h3 class="card-title fw-bold m-0">Instantiate Workspace Task</h3>
                    </div>
                    <form action="{{ url_for('add_task') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Task Title</label>
                            <input type="text" name="title" class="form-control" placeholder="E.g., Complete System Authentication Module Integration" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Detail standard operational directives, goals or execution vectors..."></textarea>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Priority Hierarchy</label>
                                <select name="priority" class="form-select">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Current State</label>
                                <select name="status" class="form-select">
                                    <option value="Pending" selected>Pending</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Target Timeline Due Date</label>
                                <input type="date" name="due_date" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">Commit Node Architecture</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
