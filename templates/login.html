{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card premium-card p-4">
                <div class="card-body">
                    <h3 class="card-title text-center fw-bold mb-4">Account Login</h3>
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter security credentials" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted small">New user?</span> <a href="{{ url_for('register') }}" class="small text-decoration-none">Create account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
