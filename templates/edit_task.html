{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card premium-card p-4">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
                        <h3 class="card-title fw-bold m-0">Sync Task Target</h3>
                    </div>
                    <form action="{{ url_for('edit_task', task_id=task.id) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Task Title</label>
                            <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="4">{{ task.description }}</textarea>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Priority Hierarchy</label>
                                <select name="priority" class="form-select">
                                    <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                                    <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                                    <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Current State Status</label>
                                <select name="status" class="form-select">
                                    <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                                    <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                                    <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Timeline Target Date</label>
                                <input type="date" name="due_date" class="form-control" value="{{ task.due_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">Update Engine Tracking Node</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
